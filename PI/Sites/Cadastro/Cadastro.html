<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro Hospitalar</title>

    <style>
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #f8fafc;
            margin: 0;
            padding: 0;
        }
        /* Header */
        header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding: 8px 40px;
            background:white;
            border-bottom:1px solid #e5e7eb;
        }
        .logo{
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .logo img{
            height: 50px;
            width: 50px;
        }

        .titulo {
            height: 20px;
            font-size: 18px;
            font-weight: 700;
            color:#111827;
        }

        .links{
            display:flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #374151;
            gap: 20px;
        }

        .escolhaLinks{
            text-decoration:none;
            color:#111827;
            font-size:14px;
            transition:0.2s;
        }

        .escolhaLinks:hover{
            color:#012790
        }
        .login{
            display: flex;
            justify-content: center;
            align-items: center;
            width: 80px;
            font-weight: 700;
            background:#111827;
            color:white;
            padding:8px 14px;
            border-radius:8px;
        }

        .login:hover{
            color: white;
            background:#012790;
        }

        /* Conteúdo */
        .container{
            padding: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .titulo-cadastro{
            display: flex;
            justify-content: center;
            font-size: 16px;
            color: #111827;
            margin-top: -20px;
        }
        .content {
            width: 30vw;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            text-align: center;
        }
        
        input {
            width: 92%;
            height: 10px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            font-size: 14px;
            transition: all 0.2s;
            background: #f9fafb;
            margin-bottom: 14px;
        }

        input:hover{
            border-color: #d1d5db;
            transform: translateY(-3px);
        }

        button {
            width: 100%;
            height: 40px;
            background: #111827;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: #012790;
            border-color: #d1d5db;
            transform: translateY(-3px);
        }

    </style>
</head>

<body>
    <header>
        <div class="logo">
            <img src="imgs/logo.png" alt="Logo da Smart Waste Systems" height="100" width="100">
            <!-- Por que alt? E isso em várias imagens... Leitor de tela em resumo! -->
            <p class="titulo">Smart Waste Systems</p>
        </div>

        <div class="links">
            <a href="#hero-section" class="escolhaLinks">Home</a>
            <a href="#servicos" class="escolhaLinks">Serviços</a>
            <a href="#sobre-nos" class="escolhaLinks">Sobre Nós</a>
            <a href="#fundadores" class="escolhaLinks">Fundadores</a>
            <a href="#formulario" class="escolhaLinks">Contate-nos</a>
            <a href="#" class="escolhaLinks login">Login</a>
            <!-- Nesse precisamos do login! Então confie. -->
        </div>
    </header>

    <div class="container">
        <div class="content">
            <div class="titulo-cadastro">
                <h1>Cadastro</h1>
            </div>
    
            <input type="text" id="nome_completo" placeholder="Nome Completo"><br>
            <input type="text" id="senha" placeholder="Senha"><br>
            <input type="text" id="confirmar_senha" placeholder="Confirmar Senha"><br>
            <input type="text" id="codigo_hospital" placeholder="Código do Hospital"><br>
            <input type="tel"  id="telefone" placeholder="Telefone"><br>
            <input type="email" id="email" placeholder="Email"><br>
    
            <div id="div_mensagem"></div>

            <button onclick="cadastrar()">Cadastrar</button>
        </div>
    </div>

</body>
</html>

<script>
function cadastrar(){
    let senhaa = senha.value;
    let confirmar = confirmar_senha.value;
    let emaill = email.value;

    let msg = "";

    if (senhaa !== confirmar) {
        msg = `<b style="color: brown; font-size: 14px;">As senhas não coincidem!</b>`;
    } else if (!emaill.includes("@")) {
        msg = `<b style="color: brown; font-size: 14px;">O email deve conter '@'!</b>`;
    } else {
        msg = `<b style="color: brown; font-size: 14px;">Cadastro realizado com sucesso!</b>`;
    }

    div_mensagem.innerHTML = msg;
}
</script>
