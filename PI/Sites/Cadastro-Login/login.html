<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TempMonitor</title>
    <style>
      * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  line-height: 1.6;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(to top, #eff2f6, #075bbb);
  min-height: 100vh;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  height: 10vh;
  background-color: rgba(39, 103, 188, 0.729);
  color: rgba(255, 255, 0, 0.75);
  font-size: 1.2rem;
  font-weight: 600;
}

.logo{
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 10px;
  
}

.card {
  height: 90vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.forms {
  background-color: #ffffff;
  border-radius: 14px;
  padding: 32px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 15px 30px rgba(0, 0, 0, 0.35);
}


.form h2 {
  margin-bottom: 20px;
  color: #111;
}

.form input {
  width: 100%;
  height: 42px;
  margin-bottom: 14px;
  padding: 0 14px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 0.95rem;
}

.form button {
  width: 100%;
  height: 42px;
  margin-top: 10px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: none;
  font-size: 1em;
  cursor: pointer;
  color: #f2efef;
  background-color: rgb(38, 74, 233);
  transition: all 0.3s ease;
}

.form button:hover {
  background-color: rgb(27, 46, 134);
  transform: translateY(-2px);
}
    </style>
  </head>
  <body>
    <main class="page">
      
        <header class="header">
          <section class="logo">
            <img src="" alt="logo">
            <h1>S.W.S</h1>
          </section>
          <section id="links">
            <button></button>
            <button></button>
            <button></button>
            <button></button>
          </section>
        </header>


        <section class="card">  
          <section class="content">
            <div class="forms">
          <form id="login-form" class="form">
            <h2>Login</h2>
            <input
              type="number"
              name="impcodigo"
              id="impcodigo"
              placeholder="Código do Hospital"
              autocomplete="email"       
            />

            <input
              type="email"
              name="impemail"
              id="impemail"
              placeholder="Email"
              autocomplete="email"       
            />

            <input
              type="password"
              name="impsenha"
              id="impsenha"
              placeholder="Senha"
              autocomplete="current-password"
            />
            <button type="submit" id="btdlogin">Entrar</button>
          </form>
    </main>
  </body>
</html>
