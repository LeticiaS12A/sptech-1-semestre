<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body style="margin:0;background-color:#d0e8ff;font-family:Arial; color: #36a2eb;">
    <h1 style="display:flex;justify-content:center;align-items:center;">Dashboard KPIs
    </h1>
    
    <div style="background-color:#d6f2fa;padding:20px;display:flex;gap:40px;justify-content:center;align-items:center;height:78vh;">
        <div style="width:500px; height: 72vh;">
            <canvas id="myChart"></canvas>
        </div>
    </div>
</body>
</html>
<script>
const ctx = document.getElementById('myChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Lixeira A'],
        datasets: [
            {
                label: 'Temperatura',
                data: [30,29,28,25,22,23],
                borderColor: '#ff6384',
                backgroundColor: '#ff6384',
                tension: 0.3
            },
        ],
        labels: ['Lixeira B'],
        datasets: [
            {
                label: 'Temperatura',
                data: [30,29,28,25,22,23],
                borderColor: '#ff6384',
                backgroundColor: '#ff6384',
                tension: 0.3
            },
        ],
        labels: ['Lixeira C'],
        datasets: [
            {
                label: 'Temperatura',
                data: [30,29,28,25,22,23],
                borderColor: '#ff6384',
                backgroundColor: '#ff6384',
                tension: 0.3
            },
        ]
    },
    options: {
    responsive: true,
    maintainAspectRatio: false,

    scales: {
        y: {
            beginAtZero: true,
            min: 0,
            max: 100,

            ticks: {
                stepSize: 5, // ✅ agora pula de 5 em 5
                callback: function(value){
                    return value + '%';
                }
            },

            title: {
                display: true,
                text: 'Volume (%)'
            }
        }
    }
    }
});
</script>
