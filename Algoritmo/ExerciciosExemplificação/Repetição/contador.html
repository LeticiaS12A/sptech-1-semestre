<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="contar()">Contar</button>

    <div id="div_mensagem"></div>
</body>
</html>
<script>
    let contador = 0;

    function contar(){
        if(contador < 10){
            contador++;
            div_mensagem.innerHTML = `Contador: ${contador}`;
        }
    }
</script>
