<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag para Seleção</title>
</head>
<body>
    
    Marca:
    <select id="select_marca">
        <option value="#">Selecione uma opção</option>
        <option>Nike</option>
        <option>Gucci</option>
        <option>Jordan</option>
        <option>Adidas</option>
    </select><br><br>

    <button onclick="selecionar()">Selecionar Marca</button><br><br>

    <div id="div_msg"></div>
</body>
</html>
<script>
    function selecionar(){
        let marca = select_marca.value

        if(marca == '#'){
            div_msg.innerHTML = `<b style="color: brown;">Selecione uma marca valida!</b>`;
        } else {
            div_msg.innerHTML = `Marca selecionada: ${marca}`;
        }
    }
</script>
