<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estrutura decisão</title>
</head>
<body>
    <h1>Estrutura de descisão</h1><br>

    <input type="text" id="ipt_idade"><br>
    <button onclick="verificar()">verificar</button><br><br>
    <div id="div_mensagem"></div>
</body>
</html>
<script>
    function verificar(){
    let idade = Number(ipt_idade.value);

        if (idade >= 18){
            div_mensagem.innerHTML = `Maior de idade! Pode votar e dirigir!`;
        }
        if (idade < 18){
            div_mensagem.innerHTML = `Menor de idade!`;

            if (idade >= 16){
                div_mensagem.innerHTML = `Pode votar mas não pode dirigir`;
            }   else{
                div_mensagem.innerHTML = `Não pode votar mas não pode dirigir`;
            }
        }
    }
</script>
