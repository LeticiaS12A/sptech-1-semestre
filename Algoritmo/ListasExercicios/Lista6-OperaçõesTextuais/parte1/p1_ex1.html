<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exericico 1</title>
</head>
<body>
    <h1>Validações de Campos com Métodos de String</h1><br>

    Digite uma frase:
    <input type="text" id="ipt_frase"><br>
    <button onclick="analisar()">Analisar Frase</button><br><br>

    <div id="div_msg"></div>
</body>
</html>
<script>
    function analisar(){
        let frase = ipt_frase.value;
        let qtdCaracter = frase.length;

        div_msg.innerHTML = `Tamanho da Frase: ${qtdCaracter}<br>`;

        if(qtdCaracter < 10){
            div_msg.innerHTML += `<p style="color: red">Frase Curta!</p>`;
        }else{
            div_msg.innerHTML += `<p style="color: blue">Frase longa!</p>`;
        }
    }
</script>
