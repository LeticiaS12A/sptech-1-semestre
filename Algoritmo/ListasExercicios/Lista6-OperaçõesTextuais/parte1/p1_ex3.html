<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 3</title>
</head>
<body>
    <h1>Primeira e Última letra</h1><br>

    Digite uma frase:
    <input type="text" id="ipt_frase"><br>
    Digite uma palavra:
    <input type="text" id="ipt_palavra"><br>

    <button onclick="analisar()">Analisar Frase</button><br><br>
    
    <div id="div_msg"></div>
</body>
</html>
<script>
    function analisar(){
        let frase = ipt_frase.value;
        let palavra = ipt_palavra.value; 
        let fraseComeco = frase.startsWith(palavra);
        let fraseFim = frase.endsWith(palavra);

        if(fraseComeco && fraseFim){
            div_msg.innerHTML = `A frase começa e termina com ${palavra}!`;
        }else if(fraseComeco == true){
            div_msg.innerHTML = `A frase começa com ${palavra}!`;
        }else if(fraseFim == true){
            div_msg.innerHTML = `A frase termina com ${palavra}!`;
        }else{
            div_msg.innerHTML = `A frase não começa e nem termina com ${palavra}!`;
        }
    }
</script>
