<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 6</title>
</head>
<body>
    <h1>Times Paulistas</h1><br>

    Digite seu time:
    <input type="text" id="ipt_time"><br><br>

    <button onclick="ver()">Fale sobre esse time</button><br>

    <div id="div_msg"></div>
</body>
</html>
<script>
    function ver(){
        let time = ipt_time.value;

        if(time == "Corinthians"){
            div_msg.innerHTML = `<div style="background:black;color:white">Salve o Corinthians</div>`;
        } else if(time == "Palmeiras"){
            div_msg.innerHTML = `<div style="background:green;color:white">Salve o alviverde imponente</div>`;
        } else if(time == "Santos"){
            div_msg.innerHTML = `<div style="background:white;color:black">Agora quem dá a bola é o Santos</div>`;
        } else if(time == "São Paulo"){
            div_msg.innerHTML = `<div style="background:black;color:red">Salve o Tricolor paulista</div>`;
        }
    }
</script>
