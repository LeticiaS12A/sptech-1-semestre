<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 11</title>
</head>
<body>
    <h1>Umidade do ar</h1><br>

    Digite a umidade:
    <input type="text" id="ipt_umidade"><br><br>

    <button onclick="verificar()">Verificar umidade</button><br>

    <div id="div_msg"></div>
</body>
</html>
<script>
    function verificar(){
        let umidade = Number(ipt_umidade.value);

        if(umidade < 0 || umidade > 100){
            alert(`Valor inválido`);
        } else if(umidade < 12){
            div_msg.innerHTML = `Estado de emergência`;
        } else if(umidade <= 20){
            div_msg.innerHTML = `Estado de alerta`;
        } else if(umidade <= 30){
            div_msg.innerHTML = `Estado de atenção`;
        } else {
            div_msg.innerHTML = `Nenhum risco`;
        }
    }
</script>
