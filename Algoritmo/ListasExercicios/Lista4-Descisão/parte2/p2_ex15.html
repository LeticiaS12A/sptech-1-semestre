<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 15</title>
</head>
<body>
    <h1>Análise da média de notas</h1><br>

    Digite a primeira nota:
    <input type="text" id="ipt_nota1"><br>
    Digite a segunda nota:
    <input type="text" id="ipt_nota2"><br><br>

    <button onclick="verificar()">Verificar situação</button><br>

    <div id="div_msg"></div>
</body>
</html>
<script>
    function verificar(){
        let nota1 = Number(ipt_nota1.value);
        let nota2 = Number(ipt_nota2.value);
        let media = (nota1 + nota2) / 2;

        if(media >= 6){
            alert('Parabéns, aprovado!');
        }
        if(media < 6){
            alert('Tente outra vez...');
        }
    }
</script>
