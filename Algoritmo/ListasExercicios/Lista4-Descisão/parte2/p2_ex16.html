<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 16</title>
</head>
<body>
    <h1>Controle de peso no elevador - v2</h1><br>

    Digite a quantidade de homens no elevador:
    <input type="text" id="ipt_homens"><br>
    Digite a quantidade de mulheres no elevador:
    <input type="text" id="ipt_mulheres"><br><br>

    <button onclick="ligar()">Ligar elevador</button><br>

    <div id="div_msg"></div>
</body>
</html>
<script>
    function ligar(){
        let homens = 90 * (Number(ipt_homens.value));
        let mulheres = 70 * (Number(ipt_mulheres.value));
        let total = homens + mulheres;
        let perderPeso = total - 500;

        if(total <= 500){
            div_msg.innerHTML = `<p style="color: green;">Elevador vai se mover, pois está com ${total.toFixed(2)}kg</p>`;
        } else{
            div_msg.innerHTML = `<p style="color: red;">Alguém precisa descer. Precisa perder ${perderPeso.toFixed(2)}kg para mover o elevador</p>`;
        }
    }
</script>
