<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 20</title>
</head>
<body>
    <h1>Análise de economia</h1><br>

    Digite sua meta de economia:
    <input type="text" id="ipt_meta"><br>
    Digite o quanto tem guardado:
    <input type="text" id="ipt_valor_guardado"><br><br>

    <button onclick="analisar()">Analisar economia</button><br>

    <div id="div_msg"></div>
</body>
</html>
<script>
    function analisar(){
        let meta = Number(ipt_meta.value);
        let valorGuardado = Number(ipt_valor_guardado.value);
        let valorFinal = valorGuardado - meta;
        let valorRestante = meta - valorGuardado;

        if(valorGuardado >= meta){
            div_msg.innerHTML = `Parabéns, meta alcançada!`;
            if(valorGuardado > meta){
                div_msg.innerHTML += `Meta ultrapassada em R$${valorFinal.toFixed(2)}`;
            }
        }else {
            div_msg.innerHTML = ` Força! Ainda em busca da meta! Falta R$${valorRestante.toFixed(2)}`;
        }
    }
</script>
