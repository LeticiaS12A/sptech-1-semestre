<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 17</title>
</head>
<body>
    <h1>Par ou Impar</h1><br>

    Digite um número:
    <input type="text" id="ipt_numero"><br><br>

    <button onclick="analisar()">Analisar</button><br>

    <div id="div_msg"></div>
</body>
</html>
<script>
    function analisar(){
        let numero = Number(ipt_numero.value);
        let resto = numero % 2;

        if(resto == 0){
            div_msg.innerHTML = `<p style="color: red; background-color: yellow;">Esse número é PAR</p>`;
        } else{
            div_msg.innerHTML = `<br><b style="color: blue;">Esse número é impar</b>`;
        }
    }
</script>
