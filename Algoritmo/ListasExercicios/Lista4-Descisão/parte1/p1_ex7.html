<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 7</title>
</head>
<body>
    <h1>Financiamento Casa própria</h1>

    Digite a renda familiar:
    <input type="text" id="ipt_renda"><br>
    Digite o valor da prestação:
    <input type="text" id="ipt_prestacao"><br>

    <button onclick="verificar()">Verificar financiamento</button><br><br>

    <div id="div_msg"></div>
</body>
</html>
<script>
    function verificar(){
        let renda = Number(ipt_renda.value);
        let prestacao = Number(ipt_prestacao.value);
        let porcentagem = (prestacao / renda) * 100;
    
        div_msg.innerHTML = `A prestação corresponde a ${porcentagem}% da renda familiar`;
    
        if(porcentagem > 30){
            div_msg.innerHTML = `<b style="color: red">Será necessário complementar a renda familiar</b>`;
        }
    }
</script>
