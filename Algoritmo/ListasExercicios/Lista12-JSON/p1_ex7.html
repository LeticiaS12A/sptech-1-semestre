<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 7</title>
</head>
<body>
    <div>
        <h3>Cadastro de Jogos com Conversão de Texto</h3>
        Nome do jogo:
        <input type="text" id="ipt_nome"><br>
        
        Empresa:
        <input type="text" id="ipt_empresa"><br>

        Plataforma:
        <input type="text" id="ipt_plataforma"><br>
    </div>
    <button onclick="cadastrar()">Cadastrar Jogo</button><br>


    <div id="div_msg"></div>
</body>
</html>
<script>
    let jogo;

    function cadastrar(){
        jogo = {
            nome: ipt_nome.value,
            empresa: ipt_empresa.value,
            plataforma: ipt_plataforma.value
        }
        jogo.nome = jogo.nome.toUpperCase();
        jogo.empresa = jogo.empresa.toUpperCase();

        div_msg.innerHTML = `
            Jogo: ${jogo.nome}<br>
            Empresa: ${jogo.empresa}<br>
            Plataforma: ${jogo.plataforma}<br>`;
    }
</script>
