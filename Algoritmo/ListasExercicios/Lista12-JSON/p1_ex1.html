<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicico 1</title>
</head>
<body>
    <div>
        <h3>Cadastro de Pets com Informações Agrupadas</h3>
        Nome do pet:
        <input type="text" id="ipt_pet"><br>

        Tipo do animal:
        <input type="text" id="ipt_tipo"><br>
        
        Idade:
        <input type="text" id="ipt_idade"><br><br>
    </div>
    <button onclick="adicionar()">Cadastrar Pet</button><br>


    <div id="div_msg"></div>
</body>
</html>
<script>
    let pet;

    function adicionar(){
        pet = {
            nome: ipt_pet.value,
            tipo: ipt_tipo.value,
            idade: ipt_idade.value
        }

        div_msg.innerHTML = `
            Pet: ${pet.nome}<br>
            Tipo: ${pet.tipo}<br>
            Idade: ${pet.idade}<br>`;

        console.log(pet);
    }
</script>
