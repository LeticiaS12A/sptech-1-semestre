<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Desempenho Escolar: O Aluno Foi Aprovado?</h1><br>

    Digite a nota do aluno:
    <input type="text" id="ipt_nota"><br><br><br>
    Digite a frequência do aluno:
    <input type="text" id="ipt_frequencia"><br><br><br>
    
    <button onclick="avaliar()">Avaliar aluno</button><br><br>
    
    <div id="div_msg"></div>
</body>
</html>
<script>
    function avaliar(){
        let nota = Number(ipt_nota.value);
        let frequencia = Number(ipt_frequencia.value);

        if(nota < 0 || nota > 10){
            alert('Onde já se viu nota <0 ou >10?');
            div_msg.innerHTML = ``;
        } else if(frequencia < 0 || frequencia > 100){
            alert('Onde já se viu frequência <0 ou >100?');
            div_msg.innerHTML = ``;
        } else if(nota < 6){
            div_msg.innerHTML += `Aluno ficou abaixo da média<br>`;

            if(frequencia >= 75){
            div_msg.innerHTML += `Aluno aprovado por frequência<br>`;
            } else{
                div_msg.innerHTML += `Aluno reprovado por frequência<br>`;
            }
        } else if(nota >= 6 || nota <= 8){
            div_msg.innerHTML += `Aluno ficou na média<br>`;

            if(frequencia >= 75){
            div_msg.innerHTML += `Aluno aprovado por frequência<br>`;
            } else{
                div_msg.innerHTML += `Aluno reprovado por frequência<br>`;
            }
        } else if(nota > 8 || nota <= 10){
            div_msg.innerHTML += `Aluno acima da média<br>`;

            if(frequencia >= 75){
            div_msg.innerHTML += `Aluno aprovado por frequência<br>`;
            } else{
                div_msg.innerHTML += `Aluno reprovado por frequência<br>`;
            }
        } 
    }
</script>
