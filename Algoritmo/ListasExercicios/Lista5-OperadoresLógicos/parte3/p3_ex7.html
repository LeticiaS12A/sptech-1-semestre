<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Autenticação Segura com Tentativas Limitadas</h1><br>

    Digite seu login:
    <input type="text" id="ipt_login"><br>
    Digite sua senha:
    <input type="text" id="ipt_senha"><br><br>
    Digite uma informação pessoal:
    <input type="text" id="ipt_pessoal"><br><br>

    <button onclick="autenticar()">Autenticar</button><br><br>

    <div id="div_msg"></div>
</body>
</html>
<script>
    let falhas = 1;
    let tentativas = 3;

    function autenticar(){
        let login = ipt_login.value;
        let senha = ipt_senha.value;
        let pessoal = ipt_pessoal.value;

        if((login == 'ana' && senha == 'braga') && (pessoal == '1949' || pessoal == 'louro josé') && (tentativas > 0)){
            tentativas = 3;
            div_msg.innerHTML = `Usuário autenticado<br><br>`;
        } else if(tentativas > 0){
            tentativas -= falhas;
            
            div_msg.innerHTML += `Falha na autenticação <br>
            Você ainda tem ${tentativas} tentativa(s)<br><br>`;
        } else{
            div_msg.innerHTML += `Usuário BLOQUEADO! Procure seu gerente!<br><br>`;
        }
    }
</script>
