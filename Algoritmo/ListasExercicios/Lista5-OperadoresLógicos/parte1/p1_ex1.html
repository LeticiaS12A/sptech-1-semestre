<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exercicio 1</title>
</head>
<body>
    <h1>Conforto Térmico: A Temperatura Está Ideal? </h1>

    Digite a temperatura:
    <input type="text" id="ipt_temp"><br><br>

    <button onclick="verTemp()">Ver situação</button>

</body>
</html>
<script>
    function verTemp(){
        let temp = Number(ipt_temp.value);

        if(temp >= 21 && temp <= 24){
            alert(`Temperatura confortável :D`);
        } else{
            alert(`Temperatura DESCONFORTÁVEL :C`);
        }
    }
</script>
