<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 6</title>
</head>
<body>
    <h1>Menor valor</h1>
    <hr><br>
    
    <button onclick="exibir()">Menor valor</button><br><br>
    <div id="div_msg"></div>
</body>
</html>
<script>
    array = [1,3,5,10,15,20,12,0,8]

    function exibir() {
        div_msg.innerHTML = menorValor(array);
    }

    function menorValor(a){
        let menor = a[0];

        for(let i = 0; i<a.length;i++){
            if(a[i]< menor){
                menor = a[i];
            }
        }
        return menor;
    }
</script>
