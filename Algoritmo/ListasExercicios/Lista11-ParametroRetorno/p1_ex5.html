<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 5</title>
</head>
<body>
    <h1>Maior valor</h1>
    <hr><br>
    
    <button onclick="exibir()">Maior valor</button><br><br>
    <div id="div_msg"></div>
</body>
</html>
<script>
    array = [1,3,5,10,15,20,12,0,8];

    function exibir() {
        div_msg.innerHTML = maiorValor(array);
    }

    function maiorValor(a){
        let maior = 0;

        for(let i = 0; i<a.length;i++){
            if(a[i]> maior){
                maior = a[i];
            }
        }
        return maior;
    }
</script>
