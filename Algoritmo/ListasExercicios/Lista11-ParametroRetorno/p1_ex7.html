<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 7</title>
</head>
<body>
    <h1>Ver a média de um vetor</h1>
    <hr><br>
    
    <button onclick="exibir()">Ver a média</button><br><br>
    <div id="div_msg"></div>
</body>
</html>
<script>
    array = [1,3,5,10,15,20,12,0,8];

    function exibir() {
        div_msg.innerHTML = mediaElementos(array);
    }

    function mediaElementos(a) {
        let media = 0;
        
        for(let i = 0; i<a.length;i++){
            media += a[i];
        }
        media = media/a.length;
        return media;
    }
</script>
