<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 2</title>
</head>
<body>
    <h1>Vogais</h1>
    <hr><br>
    
    <input type="text" id="texto" placeholder="insira um texto">
    <button onclick="exibir()">Inserir</button><br><br>
    <div id="div_msg"></div>
</body>
</html>
<script>
    function exibir() {
        div_msg.innerHTML = verif(texto.value);
    }

    function verif(a){
        if(a.indexOf('a') != -1){
            return true
        }else if (a.indexOf('e') != -1){
            return true
        }else if (a.indexOf('i') != -1){
            return true
        }else if (a.indexOf('o') != -1){
            return true
        }else if (a.indexOf('u') != -1){
            return true
        }else {
            return false
        }
    }
</script>
