<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 6</title>
</head>
<body>
    <h1>Filtro de Números Cabalísticos</h1>

    <button onclick="filtrar()">Filtrar números Cabalísticos</button><br><br>
    
    <div id="div_msg"></div>
</body>
</html>
<script>
    function filtrar(){
        let contador = 1;
        let mensagem = '';

        while(contador <= 30){
            if(contador != 3 && contador != 4 && contador != 7 && contador != 10 && contador != 12){
                mensagem += contador + '<br>';
            }
            contador++;
        }

        div_msg.innerHTML = mensagem;
    }
</script>
