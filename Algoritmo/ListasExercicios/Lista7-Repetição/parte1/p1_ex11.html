<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 11</title>
</head>
<body>
    <h1>Tabuada Colorida</h1>

    Digite a tabuada:
    <input id="ipt_tabuada"><br>
    Digite o limite:
    <input id="ipt_limite"><br><br>

    <button onclick="tab()">Ver Tabuada</button><br><br>

    <div id="div_msg"></div>
</body>
</html>
<script>
    function tab(){
        let tabuada = Number(ipt_tabuada.value);
        let limite = Number(ipt_limite.value);

        let contador = 1;
        let mensagem = '';

        while(contador <= limite){
            if(contador % 2 == 0){
                mensagem += `<span style="color:blue">${tabuada} x ${contador} = ${tabuada*contador}</span><br>`;
            } else {
                mensagem += `<span style="color:red">${tabuada} x ${contador} = ${tabuada*contador}</span><br>`;
            }
            contador++;
        }

        div_msg.innerHTML = mensagem;
    }
</script>
