<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 12</title>
</head>
<body>
    <h1>Papagaio Falante</h1>

    Digite a número:
    <input id="input_num"><br>
    Digite o frase:
    <input id="input_frase"><br><br>

    <button onclick="papagaio()">Papagaio</button>
</body>
</html>
<script>
    function papagaio() {
        let n = Number(input_num.value);
        let frase = input_frase.value;

        let contador = 1;

        while (contador <= n) {

            let fraseRepetida = "";

            let i = 1;
            while (i <= n) {
                fraseRepetida += frase + " ";
                i++;
            }

            alert(fraseRepetida);
            contador++;
        }
    }
</script>
