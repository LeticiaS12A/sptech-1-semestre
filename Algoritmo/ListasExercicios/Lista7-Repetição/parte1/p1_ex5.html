<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 5</title>
</head>
<body>
    <h1>Corrida de Voltas</h1>

    Digite as voltas:
    <input id="ipt_voltas"><br><br>

    <button onclick="correr()">Iniciar corrida!</button><br><br>

    <div id="div_msg"></div>
</body>
</html>
<script>
    function correr(){
        let voltas = Number(ipt_voltas.value);
        let contador = 1;
        let mensagem = '';

        while(contador <= voltas){
            mensagem += `Carro dando a ${contador}ª volta<br>`;
            contador++;
        }

        mensagem += 'Corrida finalizada!';

        div_msg.innerHTML = mensagem;
    }
</script>
