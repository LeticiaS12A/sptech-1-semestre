<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 4</title>
</head>
<body>
    <h1>Expressar amor</h1>

    Digite o Nome:
    <input id="ipt_nome"><br>
    Digite a Quantdade:
    <input id="ipt_qtd"><br><br>

    <button onclick="amar()">Expressar amor</button><br><br>

    <div id="div_msg"></div>
</body>
</html>
<script>
    function amar(){
        let nome = ipt_nome.value;
        let qtd = Number(ipt_qtd.value);

        let contador = 1;
        let mensagem = '';

        while(contador <= qtd){
            mensagem += `${contador} - ${nome}, eu te amo! Sempre lembre disso!<br>`;
            contador++;
        }

        div_msg.innerHTML = mensagem;
    }
</script>
