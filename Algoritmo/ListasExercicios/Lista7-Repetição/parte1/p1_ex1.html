<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 1</title>
</head>
<body>
    <h1>Contagem Simples</h1>

    <button onclick="contar()">Contar</button><br><br>
    
    <div id="div_msg"></div>
</body>
</html>
<script>
    function contar(){
        let contador = 1;
        let mensagem = '';

        while(contador <= 15){
            mensagem += contador + '<br>';
            contador++;
        }

        div_msg.innerHTML = mensagem;
    }
</script>
