<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 8</title>
</head>
<body>
    <h1>Múltiplos de 5</h1>

    Digite o número:
    <input id="ipt_num"><br><br>
    
    <button onclick="multiplos()">Adoro múltiplos de 5</button><br>

    <div id="div_msg"></div>
</body>
</html>
<script>
    function multiplos(){
        let num = Number(ipt_num.value);
        let contador = 1;
        let mensagem = '';

        while(contador <= num){
            if(contador % 5 == 0){
                mensagem += contador + '<br>';
            }
            contador++;
        }

        div_msg.innerHTML = mensagem;
    }
</script>
