<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 2</title>
</head>
<body>
    <h1>Um elefante, incomoda muita gente...</h1>

    Quantidade de elefantes:
    <input id="input_elefantes"><br><br>

    <button onclick="elefantes()">Atazanar</button><br><br>

    <div id="div_msg"></div>
</body>
</html>
<script>
    function elefantes(){
        let elefantes = Number(input_elefantes.value);
        let contador = 2;
        let mensagem = '';

        while(contador <= elefantes){
            mensagem += '1 elefante incomoda muita gente!<br>';

            let repeticao = 1;
            let texto = '';

            while(repeticao <= contador){
                texto += 'incomodam, ';
                repeticao++;
            }

            mensagem += `${contador} elefantes, ${texto}muito mais!<br><br>`;
            contador++;
        }

        div_msg.innerHTML = mensagem;
    }
</script>
