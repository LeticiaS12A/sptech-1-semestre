<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 2</title>
</head>
<body>
    <h1>Treino de Musculação</h1>

    Em quantos em quantos dias faz Musculação:
    <input id="input_dias"><br><br>

    <button onclick="treino()">Exibir rotina</button><br><br>

    <div id="div_msg"></div>
</body>
</html>
<script>
    function treino(){
        let dias = Number(input_dias.value);
        let contador = 1;
        let mensagem = '';

        while(contador <= 30){
            if((contador - 1) % dias == 0){
                mensagem += `Dia ${contador} - Musculação<br>`;
            } else {
                mensagem += `Dia ${contador} - Comer, dormir etc<br>`;
            }
            contador++;
        }

        div_msg.innerHTML = mensagem;
    }
</script>
