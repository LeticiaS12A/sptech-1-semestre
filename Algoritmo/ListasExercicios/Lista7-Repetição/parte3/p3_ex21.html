<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 21</title>
</head>
<body>
    <h1>Divisibilidade</h1>

    Limite:
    <input id="input_limite"><br>

    Divisor:
    <input id="input_divisor"><br><br>

    <button onclick="multiplos()">Somar números</button><br><br>

    <div id="div_msg"></div>
</body>
</html>
<script>
function multiplos(){
    let limite = Number(input_limite.value);
    let divisor = Number(input_divisor.value);

    let contador = 1;
    let soma = 0;
    let mensagem = '';

    while(contador <= limite){
        if(contador % divisor == 0){
            mensagem += contador + '<br>';
            soma += contador;
        }
        contador++;
    }

    mensagem += `Soma dos múltiplos: ${soma}`;

    div_msg.innerHTML = mensagem;
}
</script>
