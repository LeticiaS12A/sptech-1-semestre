<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 19</title>
</head>
<body>
    <h1>Números Primos</h1>

    Digite o número:
    <input id="input_num"><br><br>

    <button onclick="primo()">Ver</button><br><br>

    <div id="div_msg"></div>
</body>
</html>
<script>
    function primo(){
        let num = Number(input_num.value);
        let contador = 1;
        let qtd = 0;
        let mensagem = `Divisores do número ${num}:<br>`;

        while(contador <= num){
            if(num % contador == 0){
                mensagem += contador + '<br>';
                qtd++;
            }
            contador++;
        }

        if(qtd == 2){
            mensagem += `O número ${num} é primo`;
        }

        div_msg.innerHTML = mensagem;
    }
</script>
