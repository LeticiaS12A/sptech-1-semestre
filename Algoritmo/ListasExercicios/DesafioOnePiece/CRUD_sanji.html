<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD do Sanji</title>
</head>
<style>
    body{
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background-color: #bfdeec;
    font-family: 'Pirata One', cursive;
}
header{
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 10px;
    
    img{
        width: 200px;
        height: 60px;
    }
}
.div_inputs{
       display: flex;
       justify-content: center; 
       align-items: center;
       flex-direction: column;
       width: 60%;
       color: #8f2121;
       font-weight: 700;
       background-color: #ffffffeb;
       border-radius: 20px;
       border: 2px solid #8f2121;
       padding: 8px;
}
.inputs{
    width: 60%;
    gap: 8px;
    font-size: 14px;
}
.input{
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    width: 60%;
    background-color: #f5f5edad;
    border-radius: 6px;
    border: 1px solid #8f2121;
}
.input:not(:placeholder-shown):focus {
    border: 1px solid #2343ba8c;
    outline: none;
}
.button{
    width: 114px;
    height: 30px;
    background-color: #2d4ab6;
    color: #f5f5ed;
    font-weight: 700px;
    font-size: 14px;
    border-radius: 6px;
    border: 0;
}
.button:hover{
    background-color: #3c70d1;
}
.titulo{
    color: #2d4ab6;
    font-size: 28px;
    font-weight: 900;
}
.resultado{
    color: #f5f5ed;
    background-color: #2d4ab6;
    padding: 20px;
    border: 2px solid #2d4ab6;
    border-radius: 20px;
    margin-bottom: 10px;
}
</style>
<body>
    <header>
        <img src="https://upload.wikimedia.org/wikipedia/pt/7/75/One_Piece_Logo.png?_=20240831194247" alt="">
    </header>

    <div class="div_inputs">
        <h1 class="titulo">CRUD do Sanji</h1>

        Cadastrar comida:
        <input type="text" id="ipt_cadastrar" placeholder="Cadastrar Comida" class="input"><br>
        Pesquisar:
        <input type="text" id="ipt_pesquisar" placeholder="Pesquisar Comida" class="input"><br>
        <label>Nome atual:</label>
        <input type="text" id="atual" placeholder="Alterar nome" class="input">
        <label>Nome novo:</label>
        <input type="text" id="novo" placeholder="Alterar nome" class="input"><br>
        Deletar:
        <input type="text" id="ipt_deletar" placeholder="Deletar Comida" class="input"><br>

        <div>
            <button class="button" onclick="cadastrar()">Cadastrar</button>
            <button class="button" onclick="verif()">Verificar</button>
            <button class="button" onclick="pesquisar()">pesquisar</button>
            <button class="button" onclick="estoque()">Exibir Estoque</button>
            <button class="button" onclick="alterar()">Altera</button>
            <button class="button" onclick="deletar()">Deletar</button>
        </div><br><br>

        <div id="div_resultado"></div>
    </div>

</body>
</html>
<script>
    let lista = [];
    function cadastrar() {
        lista.push(ipt_cadastrar.value);
    }

    function verif() {
        let tam = lista.length;
        if (tam < 3) {
            div_resultado.innerHTML = `<div class="resultado">
                                        Desse jeito, o Luffy devora até o navio
                                       </div>`
        } else if (tam < 8) {
            div_resultado.innerHTML = `<div class="resultado">
                                        O comilão do Luffy não vai deixar sobrar nenhuma comida
                                       </div>`
        } else if (tam < 11) {
            div_resultado.innerHTML = `<div class="resultado">
                                        Assim, talvez sobre um pouco para a tripulaçã
                                       </div>`
        } else {    
            div_resultado.innerHTML = `<div class="resultado">
                                        Desse jeito vai ter comida para todo mundo e ainda consigo guardar um pouco para a senhorita Nami.
                                       </div>`
        }
    }

    function pesquisar() {
        let valor = ipt_pesquisar.value;
        let valor2 = 0;
        for (let i = 0; i < lista.length; i++) {
            if (valor == lista[i]) {
                valor2++;
            }
        }
        if (valor > 0) {
            div_resultado.innerHTML = `<div class="resultado">
                                        Temos a comida ${valor} e há ${valor2} unidade(s) dela
                                       </div>`
        } else {
            div_resultado.innerHTML = `<div class="resultado">
                                        Alguém vai ter que comprar ${valor}, tá fazendo falta...
                                       </div>`
        }
    }

    function estoque() {
        let msg = '';

        for (let i = 0; i < lista.length; i++) {
            let valor = 0;
            let jaContado = false;

            for (let k = 0; k < i; k++) {
                if (lista[i] === lista[k]) {
                    jaContado = true;
                }
            }

            if (!jaContado) {
                for (let j = 0; j < lista.length; j++) {
                    if (lista[i] === lista[j]) {
                        valor++;
                    }
                }

                if (valor === 1) {
                    msg += `<div class="resultado">
                                - ${lista[i]} (${valor} unidade)<br>
                            </div>`;
                } else if (lista[i] == null){
                }else {
                    msg += `<div class="resultado">
                                - ${lista[i]} (${valor} unidades)<br>
                            </div>`;

                }
            }
        }

        div_resultado.innerHTML = msg;
    }

    function alterar() {
        let atualNome = atual.value;
        let novoNome = novo.value; 
        let valor = 0;

        for (let i = 0; i < lista.length; i++) {
            if (lista[i] == atualNome) {
                lista[i] = novoNome;
                valor++;
            }
        }

        if (valor > 0) {
            div_resultado.innerHTML = `<div class="resultado">
                                        ${atualNome} foi alterada para ${novoNome}
                                       </div>`;
        } else {
            div_resultado.innerHTML = `<div class="resultado">
                                        ${atualNome} não foi encontrada no estoque
                                       </div>`;
        }
    }

    function deletar() {
        let del = ipt_deletar.value;
        let valor = 0;

        for (let i = 0; i < lista.length; i++) {
            if (lista[i] == del) {
                lista[i] = null;
                valor++;
            }
        }
        if (valor > 0) {
            div_resultado.innerHTML = `<div class="resultado">
                                        A comida ${del} foi removida do estoque.
                                       </div>`;
        } else {
            div_resultado.innerHTML = `<div class="resultado">
                                        A comida ${del} não está no estoque.
                                       </div>`;

        }
    }
</script>
