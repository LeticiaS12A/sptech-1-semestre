<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 3</title>
</head>
<body>
    <h1>Bem vindo ao Futebol</h1>

    <input type="text" placeholder="Seu time" id="input_nometime">
    <input type="number" placeholder="Quantidade de titulos" id="input_qtdtitulos">
    
    <button onclick="infoTime()">Amo meu time</button>
</body>
</html>
<script>
    function infoTime(){
        alert('O time ' + input_nometime.value + ' tem ' + input_qtdtitulos.value + ' titulos')
    }
</script>
