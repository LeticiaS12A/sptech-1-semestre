<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 2</title>
</head>
<body>
    <h1>Bem Vindo a Calculadora de Peso e Altura</h1>

    <input type="number" placeholder="Insira seu peso" id="input_peso">
    <input type="number" placeholder="Insira sua altura" id="input_altura">

    <button onclick="faleComigo()">Fale comigo</button>
</body>
</html>
<script>
    function faleComigo(){
        alert('Você pesa ' + input_peso.value + 'kg e tem ' + input_altura.value + 'm de altura')
    }
</script>
