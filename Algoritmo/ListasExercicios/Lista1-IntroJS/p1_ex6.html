<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 6</title>
</head>
<body>
    <h1>Bem vindo ao Farol</h1>

    <button onclick="pare()">Pare</button>
    <button onclick="pense()">Pense</button>
    <button onclick="siga()">Siga</button>

    <p id="mensagem"></p>
</body>
</html>
<script>
    function pare(){
        document.getElementById("mensagem").innerHTML = "Pare e Aguarde!";
    }
    function pense(){
        document.getElementById("mensagem").innerHTML = "Pense se pode seguir ou se deve parar!";
    }
    function siga(){
        document.getElementById("mensagem").innerHTML = "Pode seguir adiante";
    }
</script>
