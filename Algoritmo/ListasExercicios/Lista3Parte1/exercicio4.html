<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 4</title>
</head>
<body>
    <input type="text" placeholder="Digite seu peso" id="input_peso">
    <input type="text" placeholder="Digite a sua altura" id="input_altura">

    <button onclick="calcularIMC()">Calcular IMC</button>

    <div id="div_mensagem"></div>
</body>
</html>
<script>
    function calcularIMC(){
        div_mensagem.innerHTML = "Seu IMC é: " + (input_peso.value / (input_altura.value ** 2))
    }
</script>
