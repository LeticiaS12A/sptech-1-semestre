<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 3</title>
</head>
<body>
    <h1>Controle de notas</h1>

    Nota 1:
    <input type="text" id="ipt_n1"><br>
    Nota 2:
    <input type="text" id="ipt_n2"><br>
    Nota 3:
    <input type="text" id="ipt_n3"><br>

    <button onclick="calcular()">Analisar desempenho</button><br><br>

    <div id="div_msg"></div>
</body>
</html>
<script>
    function calcular(){
        let n1 = Number(ipt_n1.value);
        let n2 = Number(ipt_n2.value);
        let n3 = Number(ipt_n3.value);
        let media = (n1 + n2 + n3)/3;

        div_msg.innerHTML = `Sua média foi de ${media}<br><br>`;

        if(media > 9.4){
            div_msg.innerHTML += `Parabéns,você é fora de série`;
        }
    }
</script>
