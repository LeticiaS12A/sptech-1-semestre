<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 5</title>
</head>
<body>
    <h1>Rola a pizza?</h1>

    Qual o valor da pizza?
    <input type="text" id="ipt_valor"><br>
    Quantos amigos reunidos?
    <input type="text" id="ipt_amigos"><br>

    <button onclick="calcular()">Rola a pizza?</button><br><br>

    <div id="div_msg"></div>
</body>
</html>
<script>
    function calcular(){
        let valor = Number(ipt_valor.value);
        let amigos = Number(ipt_amigos.value);
        let valorIndiv = valor / amigos;
    
        div_msg.innerHTML = `<b style="color: red"><i>Cada amigo vai pagar R$${valorIndiv} pela pizza</i></b><br><br>`;

        if(valorIndiv > 20){
            div_msg.innerHTML += `Deu ruim! Pizza muito cara!`;
        }
    }
</script>
