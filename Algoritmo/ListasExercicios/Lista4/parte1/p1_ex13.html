<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 13</title>
</head>
<body>
    <h1>Análise da c/c (Conta Corrente)</h1><br>

    Digite seu saldo em conta:
    <input type="text" id="ipt_saldo"><br>
    Digite o valor a ser retirado:
    <input type="text" id="ipt_debito"><br><br>

    <button onclick="analisar()">Analisar conta</button><br>

    <div id="div_msg"></div>
</body>
</html>
<script>
    function analisar(){
        let saldo = Number(ipt_saldo.value);
        let debito = Number(ipt_debito.value);
        let saldoAtual = saldo - debito;

        if(saldoAtual < 0){
            div_msg.innerHTML = `<b style="color: red;">o saldo atual da conta corrente é R$${saldoAtual.toFixed(2)}</b>`;
        } else{
            div_msg.innerHTML = `<i style="color: blue;">o saldo atual da conta corrente é R$${saldoAtual.toFixed(2)}</i>`;
        }

    }
</script>
