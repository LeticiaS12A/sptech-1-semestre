<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Altura:
    <input type="text" id="input_altura">
    <button onclick="analisar()">Analisar Altura</button>
    <div id="div_mensagem"></div>
</body>
</html>
<script>
    function analisar(){
        let altura = Number(input_altura.value);

        if (altura <= 1.65){
            div_mensagem.innnerHTML = `Você pode ser piloto de corrida`;
        } else if (altura <= 1.8){
            div_mensagem.innnerHTML = `Você pode ser jogador de futebol`;
        } else {
            div_mensagem.innnerHTML = `Você pode ser jogador de volei ou basquete`;
        }
    }
</script>
