<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 1</title>
</head>
<body>
    <h1>Análise de Estatura</h1><br>

    Digite sua altura:
    <input type="text" id="ipt_altura"><br><br>

    <button onclick="analisar()">Analisar Estatura</button><br><br>

    <div id="div_msg"></div>
</body>
</html>
<script>
function analisar(){
    let altura = Number(ipt_altura.value);

    if(altura <= 1.65){
        div_msg.innerHTML = "Você pode ser piloto de corrida";
    } else if(altura <= 1.80){
        div_msg.innerHTML = "Você pode ser jogador de futebol";
    } else {
        div_msg.innerHTML = "Você pode ser jogador de vôlei ou basquete";
    }
}
</script>
