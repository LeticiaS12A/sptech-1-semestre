<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 6</title>
</head>
<body>
    <input type="text" placeholder="Digite a quantidade de B-Dollars" id="ipt_qtdbdollars">
    <input type="text" placeholder="Digite o valor de 1 B-dollar em reais" id="ipt_cotacao">

    <button onclick="calcular()">Calcular Cambio</button>

    <div id="div_mensagem"></div>
</body>
</html>
<script>
    function calcular(){
        div_mensagem.innerHTML = `Ao converter seus B-Dollars, o dinheiro disponível será: R${(ipt_qtdbdollars.value * ipt_cotacao.value) - 5.50}`
    }
</script>
