<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 8</title>
</head>
<body>
    <h1>Gerar nota de aluno</h1>
    <hr><br>

    <button onclick="notaF()">Gerar uma nota de aluno entre 0 e 10</button><br><br>

    <div id="div_nota"></div><br>
    <button onclick="frequenciaF()">Gerar uma frequência de aluno entre 0 e 100</button><br><br>
    <div id="div_frequencia"></div><br>
    <button onclick="situacao()">Ver Situação</button>
</body>
</html>
<script>
    let nota = null;
    let frequencia = null;
    
    function notaF() {
        nota = Math.random() * 11;
        if (nota > 10) {
            nota = parseInt(nota);
        } else {
            nota = nota.toFixed(2);
        }
        div_nota.innerHTML = nota;
    }

    function frequenciaF() {
        frequencia = Math.random() * 101;
        if (frequencia > 100) {
            frequencia = parseInt(frequencia);
        } else {
            frequencia = frequencia.toFixed(2);
        }
        div_frequencia.innerHTML = frequencia;
    }

    function situacao() {
        let aprovado = 'Não'
        if (nota == null || frequencia == null){
            alert('gere a nota e frequencia primeiro')
        }else{
            alert(`Situacao Atual:
            Nota:${nota}
            Frequência:${frequencia}`);
        }
    }
</script>
