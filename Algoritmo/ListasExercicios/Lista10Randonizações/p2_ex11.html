<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 11</title>
</head>
<body>
    <h1>Emojis</h1>
    <hr><br>

    <button onclick="avaliar()">Avaliar</button><br><br>
    <div id="div_msg"></div>
</body>
</html>
<script>
    function avaliar() {
        let random = (Math.random() * 5).toFixed(1);
        let msg = '';
        
        if (random < 0.6) {
            msg = `Nota recebida: ${random}<br>😭`
        }else if (random < 1.6){
            msg = `Nota recebida: ${random}<br>🥹`
        }else if (random < 3.6){
            msg = `Nota recebida: ${random}<br>😐`
        }else if (random < 4.6){
            msg = `Nota recebida: ${random}<br>😊`
        }else {
            msg = `Nota recebida: ${random}<br>😃`
        }
        div_msg.innerHTML = msg;
    }
</script>
