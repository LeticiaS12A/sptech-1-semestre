<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 6</title>
</head>
<body>
    <h1>Sorteio do dia!</h1>
    <hr><br>

    <button onclick="Sortear()">Sortear momento do dia</button><br><br>

    <div id="div_msg"></div>
</body>
</html>
<script>
    function Sortear() {
        let random = Math.random()*24;
        random = parseInt(random);

        if ( random < 12){
            div_msg.innerHTML = `Bom dia, flor do dia, são ${random}h!`
        }else if ( random < 18){
            div_msg.innerHTML = `Boa tarde, já vai tarde! São ${random}h`
        }else {
            div_msg.innerHTML = `Boa noite, durma bem! São ${random}h!`
        }
    }
</script>
