<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 17</title>
</head>
<body>
    <h1>Sorteio</h1>
    <hr><br>

    Insira seu nome: <input type="text" id="nomeInput">
    <br>
    Insira seu número da sorte entre 1 e 100: <input type="text" id="sorteInput">
    Insira outro número da sorte entre 1 e 100: <input type="text" id="sorteInput2">
    Insira o ultimo número da sorte entre 1 e 100: <input type="text" id="sorteInput3"><br><br>
    <button onclick="sortear()">Sortear</button><br><br>
    <div id="div_msg"></div>
</body>
</html>
<script>
    function sortear() {
        let random = null;
        let nome = nomeInput.value;

        let sorte = Number(sorteInput.value);
        let sorte2 = Number(sorteInput2.value);
        let sorte3 = Number(sorteInput3.value);

        let i = 0;
        let j = 0;
        let k = 0;

        if (nome == '' || sorte == '' || sorte2 == '' || sorte3 == '') {
            alert('Algum campo ausente')
        } else if (sorte < 1 || sorte > 100 || sorte2 < 1 || sorte2 > 100 || sorte3 < 1 || sorte3 > 100) {
            alert('Número não está entre 1 e 100')
        } else {
            while (random != sorte) {
                random = parseInt(Math.random() * 101 + 1);
                i++;
            }
            random = null;
            while (random != sorte2) {
                random = parseInt(Math.random() * 101 + 1);
                j++;
            }
            random = null;
            while (random != sorte3) {
                random = parseInt(Math.random() * 101 + 1);
                k++;
            }
            div_msg.innerHTML += `Parabéns, ${nome} o seu número da sorte ${sorte} foi sorteado após ${i} sorteios!<br>`
            div_msg.innerHTML += `Parabéns, ${nome} o seu número da sorte ${sorte2} foi sorteado após ${j} sorteios!<br>`
            div_msg.innerHTML += `Parabéns, ${nome} o seu número da sorte ${sorte3} foi sorteado após ${k} sorteios!<br><br>`
        }
    }
</script>
